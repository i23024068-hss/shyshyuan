    <style>
       
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            cursor: none !important; 
        }

        body {
            background: #f4f4f4 url('image/JB.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        .site-wrapper {
            flex: 1; 
            display: flex;
            flex-direction: column;
        }

       
        header {
            background-color: #000080;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        nav {
            margin-top: 20px;
        }

        nav a {
            position: relative;
            color: aqua;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            cursor: none !important;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0; bottom: -5px;
            width: 0; height: 2px;
            background: white;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover {
            color: #FFF300;
        }

       
        .hero {
            flex: 1; 
            text-align: center;
            padding: 60px 20px;
            color: #FF0000;
            font-family: Cambria, serif;
        }

        .hero h2 {
            font-size: 32px;
            color: #FFFF00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 20px;
            font-weight: bold;
        }

        
        video {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        
        footer {
            text-align: center;
            padding: 15px;
            background: #FFFF00;
            color: black;
            font-weight: bold;
            flex-shrink: 0; 
        }

       
        #custom-cursor {
            width: 20px;
            height: 20px;
            background-color: rgba(0, 123, 255, 0.5); 
            border: 2px solid #007bff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none; 
            z-index: 999999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }
    </style>
</head>


<div id="custom-cursor"></div>

<script>
    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
</script>


</html>
